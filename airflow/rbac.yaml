# Minimal Role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-worker-kubetorch-minimal-binding
  namespace: default  # TODO: Update if needed or add duplicate with `kubetorch`
  labels:
    app: airflow
    component: worker-permissions
    source-role: kubetorch-role
subjects:
- kind: ServiceAccount
  name: airflow-worker
  namespace: airflow
roleRef:
  kind: Role
  name: kubetorch-minimal-role  # Existing role
  apiGroup: rbac.authorization.k8s.io
---
# ConfigMap Reader Role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-worker-kubetorch-configmap-reader-binding
  namespace: kubetorch  # Existing role namespace
  labels:
    app: airflow
    component: worker-permissions
    source-role: kubetorch-role
subjects:
- kind: ServiceAccount
  name: airflow-worker
  namespace: airflow
roleRef:
  kind: Role
  name: kubetorch-configmap-reader  # Existing role
  apiGroup: rbac.authorization.k8s.io
